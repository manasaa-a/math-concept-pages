<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Rectangle to Triangle</title>
  <style>
  :root {
    --bg-primary:#FAF8F5; --bg-1:#FFFFFF;
    --border-secondary:#C6C0B8; --shadow-sm:0 1px 4px rgba(0,0,0,0.08);
    --text-primary:#292827; --text-secondary:rgba(41,40,39,0.7); --text-tertiary:rgba(41,40,39,0.5);
    --font-heading:'Athletics',Georgia,serif; --font-body:'Untitled Sans',system-ui,sans-serif;
    --font-label:'Untitled Sans',system-ui,sans-serif;
    --space-4:4px;--space-8:8px;--space-12:12px;--space-16:16px;--space-20:20px;
    --space-24:24px;--space-32:32px;--space-48:48px;
    --gold-500:#F4AB52;--gold-600:#EC9A32;--gold-700:#CE7E12;--gold-100:#FAF1E6;
    --success-500:#6AC88A;--success-700:#28995A;
    --info-500:#74ACFC;--info-700:#407BD6;
    --error-500:#F97279;--error-700:#C8444F;
    --neutral-400:#C6C0B8;--neutral-600:#84807B;--neutral-700:#5B5854;
    --neutral-900:#33312F;--neutral-1000:#292827;
  }
</style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-primary);
      font-family: var(--font-body);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--space-32) var(--space-20) var(--space-48);
    }

    /* Canvas with slider overlay inside */
    #canvas-wrap {
      position: relative;
      border: 1px solid var(--border-secondary);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    /* Slide Me! bar inside the top of the canvas */
    .slider-overlay {
      position: absolute;
      top: 0; left: 0; right: 0;
      background: rgba(250,248,245,0.92);
      border-bottom: 1px solid var(--border-secondary);
      display: flex;
      align-items: center;
      gap: var(--space-12);
      padding: var(--space-8) var(--space-20);
      z-index: 10;
    }
    .sl-label {
      font-family: var(--font-label);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-tertiary);
      white-space: nowrap;
    }
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 200px;
      height: 4px;
      background: var(--border-secondary);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #1c1917;
      cursor: pointer;
      box-shadow: 0 1px 5px rgba(0,0,0,0.2);
    }
    input[type=range]::-moz-range-thumb {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #1c1917;
      border: none; cursor: pointer;
    }
  </style>
</head>
<body>

<div id="canvas-wrap">
  <div class="slider-overlay">
    <span class="sl-label">Slide Me!</span>
    <input type="range" id="sl-t" min="0" max="100" step="1" value="0">
  </div>
</div>

<script>
// ─── Cuemath brand palette ────────────────────────────────────────────────────
const CM = {
  brand:    '#F4AB52',  // gold-500
  brandDk:  '#CE7E12',  // gold-700
  brandLt:  '#FAF1E6',  // gold-100
  info:     '#74ACFC',  // info-500
  infoDk:   '#3464B1',  // info-800
  success:  '#6AC88A',  // success-500
  successDk:'#1C7C48',  // success-800
  error:    '#F97279',
  warning:  '#F68D50',
  purple:   '#D386F7',
  ink:      '#292827',
  ink2:     '#43413E',
  muted:    '#84807B',
  border:   '#C6C0B8',
  bg:       '#FAF8F5',
  surface:  '#FFFFFF',
};

const W = 640, H = 420;
const SLIDER_H = 40; // height of the slider overlay bar

// Rectangle geometry (centred, no slant)
const cx = W / 2, cy = (H + SLIDER_H) / 2 - 35;
const BASE = 300, HEIGHT = 170;

// Vertices — pure rectangle
const A = { x: cx - BASE/2, y: cy + HEIGHT/2 }; // bottom-left (right angle)
const B = { x: cx + BASE/2, y: cy + HEIGHT/2 }; // bottom-right
const C = { x: cx + BASE/2, y: cy - HEIGHT/2 }; // top-right (right angle)
const D = { x: cx - BASE/2, y: cy - HEIGHT/2 }; // top-left

// Rotation pivot = midpoint of diagonal BD
const Px = (B.x + D.x) / 2; // = cx
const Py = (B.y + D.y) / 2; // = cy

function rot(point, angle) {
  const cos = Math.cos(angle), sin = Math.sin(angle);
  const dx = point.x - Px, dy = point.y - Py;
  return { x: Px + dx*cos - dy*sin, y: Py + dx*sin + dy*cos };
}

function hex2rgb(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r, g, b, a];
}

function rightAngleMark(ctx, vx, vy, dir1, dir2, sz) {
  // Draw right angle square at (vx,vy), towards dir1 and dir2 (unit vectors)
  ctx.p5.push();
  ctx.p5.stroke(CM.ink2); ctx.p5.strokeWeight(1.5); ctx.p5.noFill();
  ctx.p5.line(vx + dir1.x*sz, vy + dir1.y*sz,
       vx + dir1.x*sz + dir2.x*sz, vy + dir1.y*sz + dir2.y*sz);
  ctx.p5.line(vx + dir2.x*sz, vy + dir2.y*sz,
       vx + dir1.x*sz + dir2.x*sz, vy + dir1.y*sz + dir2.y*sz);
  ctx.p5.pop();
}

let sketch;
let t = 0;

new p5(function(p) {
  sketch = p;

  p.setup = function() {
    p.createCanvas(W, H).parent('canvas-wrap');
    p.textFont('Untitled Sans, system-ui, sans-serif');
    p.noLoop();
  };

  p.draw = function() {
    p.background(CM.surface);

    const angle = t * Math.PI;
    const done  = t > 0.97;

    // Rotated triangle BCD vertices
    const Br = rot(B, angle);
    const Cr = rot(C, angle);
    const Dr = rot(D, angle);

    // ── Fills ──────────────────────────────────────────────────────────────
    p.noStroke();

    // Lower triangle ABD — gold
    p.fill(...hex2rgb(CM.brand, 150));
    p.triangle(A.x, A.y, B.x, B.y, D.x, D.y);

    // Rotating triangle BCD — info→success
    const triCol = done ? CM.success : CM.info;
    p.fill(...hex2rgb(triCol, done ? 160 : 140));
    p.triangle(Br.x, Br.y, Cr.x, Cr.y, Dr.x, Dr.y);

    // ── Outlines — each edge drawn once ────────────────────────────────────
    p.noFill(); p.strokeWeight(2.5);

    if (!done) {
      // Four outer edges of the rectangle
      p.stroke(CM.brandDk);
      p.line(A.x, A.y, B.x, B.y); // bottom  (gold)
      p.line(A.x, A.y, D.x, D.y); // left    (gold)
      p.stroke(CM.infoDk);
      p.line(D.x, D.y, C.x, C.y); // top     (blue)
      p.line(B.x, B.y, C.x, C.y); // right   (blue)
      // Diagonal once — dashed
      p.stroke(CM.ink2); p.strokeWeight(1.8);
      p.drawingContext.setLineDash([6, 4]);
      p.line(B.x, B.y, D.x, D.y);
      p.drawingContext.setLineDash([]);
    } else {
      // Final — single triangle outline
      p.stroke(CM.successDk);
      p.triangle(A.x, A.y, B.x, B.y, D.x, D.y);
    }


    // ── Parallel-side tick marks (| on top/bottom, || on left/right) ───────
    if (t < 0.4) {
      const alpha = t < 0.2 ? 200 : p.map(t, 0.2, 0.4, 200, 0);

      function perpTick(p1, p2, count) {
        const mx = (p1.x+p2.x)/2, my = (p1.y+p2.y)/2;
        const dx = p2.x-p1.x, dy = p2.y-p1.y;
        const len = Math.sqrt(dx*dx+dy*dy);
        const nx = -dy/len, ny = dx/len;
        const sz = 7, gap = 5;
        p.stroke(43, 65, 62, alpha); p.strokeWeight(1.8);
        for (let k = 0; k < count; k++) {
          const off = (k - (count-1)/2) * gap;
          const ox = (dx/len)*off, oy = (dy/len)*off;
          p.line(mx+ox+nx*sz, my+oy+ny*sz, mx+ox-nx*sz, my+oy-ny*sz);
        }
      }
      perpTick(A, B, 1); perpTick(D, C, 1); // top & bottom — |
      perpTick(A, D, 2); perpTick(B, C, 2); // left & right — ||
    }

    // ── Pivot dot during animation ─────────────────────────────────────────
    if (t > 0.03 && t < 0.97) {
      p.noStroke(); p.fill(CM.ink);
      p.circle(Px, Py, 8);
    }

    // ── Dimension labels: b and h ─────────────────────────────────────────
    if (t < 0.5) {
      p.textStyle(p.BOLD);

      // b: horizontal double-arrow below AB
      const bY = A.y + 20;
      p.stroke(CM.infoDk); p.fill(CM.infoDk); p.strokeWeight(1.8);
      p.line(A.x+8, bY, B.x-8, bY);
      p.triangle(A.x, bY, A.x+11, bY-4, A.x+11, bY+4);
      p.triangle(B.x, bY, B.x-11, bY-4, B.x-11, bY+4);
      p.noStroke(); p.fill(CM.brandDk);
      p.textAlign(p.CENTER, p.TOP); p.textSize(18);
      p.text('b', (A.x+B.x)/2, bY+3);

      // h: vertical double-arrow along left side A→D (rectangle height = perpendicular)
      const hX = A.x - 20;
      const sz = 11;
      // right-angle mark at A
      p.stroke(CM.infoDk); p.strokeWeight(1.5); p.noFill();
      p.line(A.x, A.y-sz, A.x+sz, A.y-sz);
      p.line(A.x+sz, A.y, A.x+sz, A.y-sz);
      // arrow line and heads
      p.stroke(CM.infoDk); p.fill(CM.infoDk); p.strokeWeight(1.8);
      p.line(hX, A.y-4, hX, D.y+9);
      p.triangle(hX, A.y, hX-4, A.y-10, hX+4, A.y-10);
      p.triangle(hX, D.y, hX-4, D.y+10, hX+4, D.y+10);
      // h label
      p.noStroke(); p.fill(CM.brandDk);
      p.textAlign(p.RIGHT, p.CENTER); p.textSize(18);
      p.text('h', hX-6, (A.y+D.y)/2);

      p.textStyle(p.NORMAL);
    }

    // ── b and h for done (triangle) state ────────────────────────────────
    if (done) {
      p.textStyle(p.BOLD);
      // b below base
      const bY2 = A.y + 20;
      p.stroke(CM.infoDk); p.fill(CM.infoDk); p.strokeWeight(1.8);
      p.line(A.x+8, bY2, B.x-8, bY2);
      p.triangle(A.x, bY2, A.x+11, bY2-4, A.x+11, bY2+4);
      p.triangle(B.x, bY2, B.x-11, bY2-4, B.x-11, bY2+4);
      p.noStroke(); p.fill(CM.brandDk); p.textAlign(p.CENTER, p.TOP); p.textSize(18);
      p.text('b', (A.x+B.x)/2, bY2+3);
      // h along left side AD (rectangle triangle: right angle at A)
      const hX2 = A.x - 20, sz2 = 11;
      p.stroke(CM.infoDk); p.strokeWeight(1.5); p.noFill();
      p.line(A.x, A.y-sz2, A.x+sz2, A.y-sz2); p.line(A.x+sz2, A.y, A.x+sz2, A.y-sz2);
      p.stroke(CM.infoDk); p.fill(CM.infoDk); p.strokeWeight(1.8);
      p.line(hX2, A.y-8, hX2, D.y+9);
      p.triangle(hX2, A.y, hX2-4, A.y-10, hX2+4, A.y-10);
      p.triangle(hX2, D.y, hX2-4, D.y+10, hX2+4, D.y+10);
      p.noStroke(); p.fill(CM.brandDk); p.textAlign(p.RIGHT, p.CENTER); p.textSize(18);
      p.text('h', hX2-6, (A.y+D.y)/2);
      p.textStyle(p.NORMAL);
    }

    // ── Labels below the shape ────────────────────────────────────────────
    p.noStroke();
    const labelY = A.y + 46;
    p.textAlign(p.CENTER, p.TOP);

    if (t < 0.08) {
      p.fill(CM.ink); p.textSize(14);
      p.text('Rectangle', cx, labelY);
      p.fill(CM.muted); p.textSize(15);
      p.text('Area = base × height', cx, labelY + 20);
    }
    if (done) {
      p.fill(CM.ink); p.textSize(14);
      p.text('Right-angled Triangle', cx, labelY);
      p.fill(CM.successDk); p.textSize(15);
      p.text('Area = ½ × base × height', cx, labelY + 20);
    }

    // ── Caption ───────────────────────────────────────────────────────────
    p.textSize(12); p.fill(CM.muted);
    p.textAlign(p.CENTER, p.BOTTOM);
    let caption = 'Slide to rotate the top triangle onto the bottom';
    if (t > 0.05 && t < 0.97) caption = 'Rotating 180° around the midpoint of the diagonal…';
    if (done)                  caption = 'Both triangles are identical — Triangle = ½ × Rectangle';
    p.text(caption, W/2, H - 8);
  };
});

document.getElementById('sl-t').addEventListener('input', function() {
  t = this.value / 100;
  sketch.redraw();
});
</script>
</body>
</html>
