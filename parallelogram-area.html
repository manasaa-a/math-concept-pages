<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Parallelogram Area</title>
  <script src="https://www.geogebra.org/apps/deployggb.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #c8d8e8; overflow: hidden; }
    body { display: flex; align-items: center; justify-content: center; }
    #ggb-container { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="ggb-container"></div>

  <script>
    var W = window.innerWidth;
    var H = window.innerHeight;

    var params = {
      appName: "classic",
      material_id: "m8EdKBj5",
      width: W,
      height: H,
      showToolBar: false,
      showAlgebraInput: false,
      showMenuBar: false,
      enableLabelDrags: true,
      enableShiftDragZoom: false,
      appletOnLoad: function(api) {
        setTimeout(function() {
          // Rename slider label to "Slide Me!"
          try {
            api.setCaption('K', 'Slide Me!');
            api.setLabelStyle('K', 3);
            api.setLabelVisible('K', true);
          } catch(e) {}

          // Replace "bh" with "b x h" in any text object
          var allNames = api.getAllObjectNames();
          for (var i = 0; i < allNames.length; i++) {
            var name = allNames[i];
            if (api.getObjectType(name) !== 'text') continue;
            var val = api.getValueString(name);
            var def = api.getDefinitionString(name);
            var hasBH = (val && val.indexOf('bh') !== -1) || (def && def.indexOf('bh') !== -1);
            if (!hasBH) continue;
            var tx = api.getXcoord(name);
            var ty = api.getYcoord(name);
            var source = (val && val.indexOf('bh') !== -1) ? val : def;
            var newText = source.replace(/bh/g, 'b x h');
            api.setVisible(name, false);
            api.evalCommand('areaLabel = Text("' + newText + '", (' + tx + ', ' + ty + '))');
            api.setLabelVisible('areaLabel', false);
            api.setFixed('areaLabel', true, false);
          }
        }, 700);
      }
    };

    var applet = new GGBApplet(params, true);
    window.addEventListener("load", function() {
      applet.inject("ggb-container");
    });
  </script>
</body>
</html>
