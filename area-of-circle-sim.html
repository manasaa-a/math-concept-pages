<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Area of a Circle — Simulation</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #FAF8F5;
      font-family: 'Untitled Sans', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 16px 12px;
    }
    .sim-desc {
      font-size: 14px;
      color: #44403c;
      margin-bottom: 12px;
      text-align: center;
      max-width: 680px;
      line-height: 1.5;
    }
    #canvas-wrap {
      position: relative;
      border: 1px solid #E8E4DD;
      overflow: hidden;
    }
    .ctrl-panel {
      position: absolute;
      top: 150px; left: 12px; right: 12px;
      background: #F3F0EB;
      border: 1px solid #E8E4DD;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 18px 20px;
      z-index: 10;
    }
    .sl-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .sl-label {
      width: 90px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #84807B;
      flex-shrink: 0;
    }
    .sl-val {
      font-family: 'Athletics', system-ui, sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #292827;
      min-width: 40px;
    }
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 4px;
      background: #C6C0B8;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #F4AB52;
      border: 2px solid #CE7E12;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.22);
    }
    input[type=range]::-moz-range-thumb {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #F4AB52;
      border: 2px solid #CE7E12;
      cursor: pointer;
    }
    input[type=range]:disabled { opacity: 0.35; cursor: not-allowed; }
    #btn-reset {
      align-self: flex-start;
      font-family: 'Untitled Sans', system-ui, sans-serif;
      font-size: 13px; font-weight: 600;
      padding: 8px 20px;
      background: #fff;
      border: 2px solid #C6C0B8;
      border-radius: 0;
      color: #43413E;
      cursor: pointer;
    }
    #btn-reset:hover { border-color: #F4AB52; color: #CE7E12; background: #FAF1E6; }
  </style>
</head>
<body>

<p class="sim-desc">Use the sliders to increase slices, unfold the sectors, then rearrange them into a rectangle. Watch how the circle's area becomes πr × r = πr².</p>

<div id="canvas-wrap">
  <div class="ctrl-panel">
    <div class="sl-row">
      <span class="sl-label">Slices</span>
      <input type="range" id="sl-n" min="8" max="32" step="2" value="8">
      <span class="sl-val" id="val-n">8</span>
    </div>
    <div class="sl-row">
      <span class="sl-label">Unfold</span>
      <input type="range" id="sl-unfold" min="0" max="100" step="1" value="0">
      <span class="sl-val" id="val-unfold">0%</span>
    </div>
    <div class="sl-row">
      <span class="sl-label">Rearrange</span>
      <input type="range" id="sl-rearrange" min="0" max="100" step="1" value="0" disabled>
      <span class="sl-val" id="val-rearrange">0%</span>
    </div>
    <button id="btn-reset">↺ Reset</button>
  </div>
</div>

<script>
const CM = {
  brand:   '#F4AB52',
  brandDk: '#CE7E12',
  info:    '#74ACFC',
  ink:     '#292827',
  muted:   '#84807B',
  surface: '#FFFFFF',
};

const W = 720, H = 560;
const SLIDER_H = 345;
const R   = 88;
const GAP = 20;
const CX = W / 2;
const CY = SLIDER_H + (H - SLIDER_H) / 2 + 4;

let n = 8, unfold = 0, rearrange = 0;
let sk;

function hex2rgba(hex, a) {
  return [parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16),a===undefined?255:a];
}

function lerpAngle(a, b, t) {
  let d = b - a;
  while (d >  Math.PI) d -= 2 * Math.PI;
  while (d < -Math.PI) d += 2 * Math.PI;
  return a + d * t;
}

new p5(function(p) {
  sk = p;

  p.setup = function() {
    p.createCanvas(W, H).parent('canvas-wrap');
    p.noLoop();
  };

  p.draw = function() {
    p.background(CM.surface);
    const sliceAngle = p.TWO_PI / n;
    const stripW     = p.PI * R / n;
    const rectW      = p.PI * R;
    const rectLeft   = CX - rectW / 2;

    for (let k = 0; k < n / 2; k++) {
      const circStart = -p.PI + k * sliceAngle;
      const strip     = 2 * k;
      const sepX      = rectLeft + strip * stripW + stripW / 2;
      const sepTipY   = CY - GAP;
      const sepStart  = -p.HALF_PI - sliceAngle / 2;
      const rectTipY  = CY + R / 2;
      const tipX  = p.lerp(CX, sepX, unfold);
      const tipY  = p.lerp(p.lerp(CY, sepTipY, unfold), rectTipY, rearrange);
      const start = lerpAngle(circStart, sepStart, unfold);
      drawSector(p, tipX, tipY, R, start, sliceAngle, CM.brand, 205);
    }

    for (let j = 0; j < n / 2; j++) {
      const circStart = p.PI - (j + 1) * sliceAngle;
      const strip     = n - 1 - 2 * j;
      const sepX      = rectLeft + strip * stripW + stripW / 2;
      const sepTipY   = CY + GAP;
      const sepStart  = p.HALF_PI - sliceAngle / 2;
      const rectTipY  = CY - R / 2;
      const tipX  = p.lerp(CX, sepX, unfold);
      const tipY  = p.lerp(p.lerp(CY, sepTipY, unfold), rectTipY, rearrange);
      const start = lerpAngle(circStart, sepStart, unfold);
      drawSector(p, tipX, tipY, R, start, sliceAngle, CM.info, 205);
    }

    drawAnnotations(p, rectLeft, rectW);
  };

  function drawSector(p, tipX, tipY, r, startAngle, angle, col, alpha) {
    const [cr, cg, cb] = hex2rgba(col);
    p.fill(cr, cg, cb, alpha);
    p.stroke(CM.surface); p.strokeWeight(1.5);
    p.beginShape();
    p.vertex(tipX, tipY);
    const steps = Math.max(48, Math.ceil(angle * r / 1.5));
    for (let s = 0; s <= steps; s++) {
      const a = startAngle + (s / steps) * angle;
      p.vertex(tipX + r * p.cos(a), tipY + r * p.sin(a));
    }
    p.endShape(p.CLOSE);
  }

  function drawAnnotations(p, rectLeft, rectW) {
    const BODY    = 'Untitled Sans, system-ui, sans-serif';
    const HEADING = 'Athletics, system-ui, sans-serif';
    const circA = p.map(unfold, 0, 0.25, 255, 0, true);
    if (circA > 0) {
      const [r,g,b] = hex2rgba(CM.ink);
      p.stroke(r,g,b,circA); p.strokeWeight(1.5);
      p.line(CX, CY, CX + R, CY);
      p.noStroke(); p.fill(r,g,b,circA);
      p.textFont(HEADING); p.textSize(16); p.textStyle(p.BOLD);
      p.textAlign(p.CENTER, p.BOTTOM);
      p.text('r', CX + R / 2, CY - 8);
      p.textStyle(p.NORMAL);
    }
    const rectA = p.map(rearrange, 0.65, 1.0, 0, 255, true);
    if (rectA > 0) {
      const rTop = CY - R / 2, rBot = CY + R / 2;
      const [r,g,b] = hex2rgba(CM.brandDk);
      p.stroke(r,g,b,rectA); p.strokeWeight(1.5);
      drawArrow(p, rectLeft, rTop - 24, rectLeft + rectW, rTop - 24);
      drawArrow(p, rectLeft - 24, rTop, rectLeft - 24, rBot);
      p.noStroke(); p.fill(r,g,b,rectA);
      p.textFont(HEADING); p.textSize(15); p.textStyle(p.BOLD);
      p.textAlign(p.CENTER, p.BOTTOM);
      p.text('πr', CX, rTop - 28);
      p.textAlign(p.RIGHT, p.CENTER);
      p.text('r', rectLeft - 28, CY);
      p.textFont(HEADING); p.textSize(20); p.textStyle(p.BOLD);
      p.textAlign(p.CENTER, p.TOP);
      p.text('Area = πr × r = πr²', CX, rBot + 20);
      p.textStyle(p.NORMAL);
    }
    const cap = unfold < 0.05 && rearrange < 0.05
      ? 'Adjust slices, then drag Unfold to spread the sectors'
      : rearrange > 0.9
        ? 'Rectangle area = πr × r = πr² — same as the circle!'
        : unfold >= 1.0
          ? 'Unfold complete — now drag Rearrange to form the rectangle'
          : 'More slices → straighter edges → closer to a perfect rectangle';
    p.textFont(BODY); p.textSize(12);
    p.fill(CM.muted); p.textAlign(p.CENTER, p.BOTTOM);
    p.text(cap, CX, H - 10);
  }

  function drawArrow(p, x1, y1, x2, y2) {
    p.line(x1, y1, x2, y2);
    const ang = p.atan2(y2 - y1, x2 - x1), hs = 6;
    p.noStroke();
    p.push(); p.translate(x2,y2); p.rotate(ang);
    p.triangle(0,0,-hs,-hs*.45,-hs,hs*.45); p.pop();
    p.push(); p.translate(x1,y1); p.rotate(ang+p.PI);
    p.triangle(0,0,-hs,-hs*.45,-hs,hs*.45); p.pop();
    p.stroke(CM.brandDk);
  }
});

document.getElementById('sl-n').addEventListener('input', function() {
  n = parseInt(this.value);
  document.getElementById('val-n').textContent = n;
  sk.redraw();
});
document.getElementById('sl-unfold').addEventListener('input', function() {
  unfold = parseInt(this.value) / 100;
  document.getElementById('val-unfold').textContent = this.value + '%';
  const rSlider = document.getElementById('sl-rearrange');
  if (unfold < 1.0) {
    rSlider.disabled = true; rSlider.value = 0;
    document.getElementById('val-rearrange').textContent = '0%';
    rearrange = 0;
  } else { rSlider.disabled = false; }
  sk.redraw();
});
document.getElementById('sl-rearrange').addEventListener('input', function() {
  rearrange = parseInt(this.value) / 100;
  document.getElementById('val-rearrange').textContent = this.value + '%';
  sk.redraw();
});
document.getElementById('btn-reset').addEventListener('click', function() {
  n = 8; unfold = 0; rearrange = 0;
  document.getElementById('sl-n').value = 8;
  document.getElementById('val-n').textContent = '8';
  document.getElementById('sl-unfold').value = 0;
  document.getElementById('val-unfold').textContent = '0%';
  document.getElementById('sl-rearrange').value = 0;
  document.getElementById('val-rearrange').textContent = '0%';
  document.getElementById('sl-rearrange').disabled = true;
  sk.redraw();
});
</script>
</body>
</html>
