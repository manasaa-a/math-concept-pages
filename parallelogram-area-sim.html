<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Parallelogram Area</title>
  <style>
  :root {
    --bg-primary:#FAF8F5; --bg-1:#FFFFFF;
    --border-secondary:#C6C0B8; --shadow-sm:0 1px 4px rgba(0,0,0,0.08);
    --text-primary:#292827; --text-tertiary:rgba(41,40,39,0.5);
    --font-heading:'Athletics',Georgia,serif; --font-body:'Untitled Sans',system-ui,sans-serif;
    --font-label:'Untitled Sans',system-ui,sans-serif;
    --space-8:8px;--space-12:12px;--space-16:16px;--space-20:20px;
    --space-24:24px;--space-32:32px;--space-48:48px;
    --gold-500:#F4AB52;--gold-600:#EC9A32;--gold-700:#CE7E12;--gold-100:#FAF1E6;
    --success-500:#6AC88A;--info-500:#74ACFC;--error-500:#F97279;
    --neutral-400:#C6C0B8;--neutral-600:#84807B;--neutral-700:#5B5854;
    --neutral-900:#33312F;--neutral-1000:#292827;
  }
</style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-primary);
      font-family: var(--font-body);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0; margin: 0;
    }
    #canvas-wrap {
      position: relative;
      border: 1px solid var(--border-secondary);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .slider-overlay {
      position: absolute;
      top: 0; left: 0; right: 0;
      background: rgba(250,248,245,0.92);
      border-bottom: 1px solid var(--border-secondary);
      display: flex;
      align-items: center;
      gap: var(--space-12);
      padding: var(--space-8) var(--space-20);
      z-index: 10;
    }
    .sl-label {
      font-family: var(--font-label);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-tertiary);
      white-space: nowrap;
    }
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 200px;
      height: 4px;
      background: var(--border-secondary);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #1c1917;
      cursor: pointer;
      box-shadow: 0 1px 5px rgba(0,0,0,0.2);
    }
    input[type=range]::-moz-range-thumb {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #1c1917;
      border: none; cursor: pointer;
    }
  </style>
</head>
<body>

<div id="canvas-wrap">
  <div class="slider-overlay">
    <span class="sl-label">Slide Me!</span>
    <input type="range" id="sl-t" min="0" max="100" step="1" value="0">
  </div>
</div>

<script>
const CM = {
  brand:    '#F4AB52',
  brandDk:  '#CE7E12',
  brandLt:  '#FAF1E6',
  info:     '#74ACFC',
  infoDk:   '#3464B1',
  success:  '#6AC88A',
  successDk:'#1C7C48',
  ink:      '#292827',
  ink2:     '#43413E',
  muted:    '#84807B',
  border:   '#C6C0B8',
  bg:       '#FAF8F5',
  surface:  '#FFFFFF',
};

const W = 640, H = 400;
const S = 90;            // fixed slant of parallelogram
const BASE = 280, HT = 155;
const cx = W/2 - S/2, cy = H/2 - 15; // centres the whole shape

function hex2rgb(hex, a) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16), a];
}

let sketch, t = 0;

new p5(function(p) {
  sketch = p;

  p.setup = function() {
    p.createCanvas(W, H).parent('canvas-wrap');
    p.textFont('Untitled Sans, system-ui, sans-serif');
    p.noLoop();
  };

  p.draw = function() {
    p.background(CM.surface);

    const xl = cx - BASE/2, xr = cx + BASE/2;
    const yt = cy - HT/2,   yb = cy + HT/2;

    // Ear slides full range; touching the other side → instantly gold rectangle
    const pMove   = t;             // position: 0=right, 1=left
    const settled = t > 0.97;     // snaps to gold rectangle immediately

    const A = {x: xl,   y: yb};
    const B = {x: xr,   y: yb};
    const D = {x: xl+S, y: yt};
    const E = {x: xr,   y: yt};  // directly above B

    // Moving ear position
    const Bm = {x: xr      - pMove*BASE, y: yb};
    const Cm = {x: xr+S    - pMove*BASE, y: yt};
    const Em = {x: xr      - pMove*BASE, y: yt};

    // Ear colour: gold at rest, blue while sliding, instantly back to gold when settled
    const earCol = (t < 0.03 || settled)
      ? hex2rgb(CM.brand, 150)
      : hex2rgb(CM.info, 150);

    // ── Fixed body (trapezoid) ────────────────────────────────────────────
    p.noStroke();
    p.fill(...hex2rgb(CM.brand, 150));
    p.quad(A.x, A.y, B.x, B.y, E.x, E.y, D.x, D.y);

    // ── Moving ear ────────────────────────────────────────────────────────
    p.fill(...earCol);
    p.triangle(Bm.x, Bm.y, Cm.x, Cm.y, Em.x, Em.y);

    // ── Outlines ─────────────────────────────────────────────────────────
    p.noFill(); p.strokeWeight(2.5);
    if (!settled) {
      p.stroke(CM.brandDk);
      p.line(A.x, A.y, B.x, B.y);  // base
      p.line(A.x, A.y, D.x, D.y);  // left slant
      p.line(D.x, D.y, E.x, E.y);  // body top
      p.stroke(CM.infoDk); p.strokeWeight(1.8);
      p.line(Bm.x, Bm.y, Cm.x, Cm.y);
      p.line(Cm.x, Cm.y, Em.x, Em.y);
      if (t > 0.05 && pMove < 0.99) p.line(B.x, B.y, E.x, E.y); // divider line
    } else { // settled
      // Fully settled — show clean rectangle outline in gold
      p.stroke(CM.brandDk); p.strokeWeight(2.5);
      p.rect(xl, yt, BASE, HT);
    }


    // ── Perpendicular height line h ───────────────────────────────────────
    const sz = 11;
    if (!settled) {
      // Inside parallelogram — foot of perpendicular at D.x
      const footX = D.x;
      p.stroke(CM.infoDk); p.strokeWeight(1.5); p.noFill();
      p.line(footX, yb-sz, footX+sz, yb-sz);
      p.line(footX+sz, yb, footX+sz, yb-sz);
      p.stroke(CM.infoDk); p.strokeWeight(1.8);
      p.line(footX, yb, footX, yt);
      p.textStyle(p.BOLD);
      p.noStroke(); p.fill(CM.brandDk);
      p.textAlign(p.LEFT, p.CENTER); p.textSize(18);
      p.text('h', footX+9, (yt+yb)/2);
    } else {
      // Outside rectangle — h line to the left of the left edge
      const hX = xl - 20;
      p.stroke(CM.infoDk); p.strokeWeight(1.5); p.noFill();
      p.line(xl, yb-sz, xl+sz, yb-sz);
      p.line(xl+sz, yb, xl+sz, yb-sz);
      p.stroke(CM.infoDk); p.fill(CM.infoDk); p.strokeWeight(1.8);
      p.line(hX, yb-8, hX, yt+9);
      p.triangle(hX, yb, hX-4, yb-11, hX+4, yb-11);
      p.triangle(hX, yt, hX-4, yt+11, hX+4, yt+11);
      p.textStyle(p.BOLD);
      p.noStroke(); p.fill(CM.brandDk);
      p.textAlign(p.RIGHT, p.CENTER); p.textSize(18);
      p.text('h', hX-4, (yt+yb)/2);
    }

    // ── b label below base ────────────────────────────────────────────────
    const bY = yb + 20;
    p.stroke(CM.infoDk); p.fill(CM.infoDk); p.strokeWeight(1.8);
    p.line(A.x+8, bY, B.x-8, bY);
    p.triangle(A.x, bY, A.x+11, bY-4, A.x+11, bY+4);
    p.triangle(B.x, bY, B.x-11, bY-4, B.x-11, bY+4);
    p.noStroke(); p.fill(CM.brandDk);
    p.textAlign(p.CENTER, p.TOP); p.textSize(18);
    p.text('b', (A.x+B.x)/2, bY+3);
    p.textStyle(p.NORMAL);

    // ── Labels ────────────────────────────────────────────────────────────
    const labelY = yb + 48;
    p.textAlign(p.CENTER, p.TOP);
    if (!settled) {
      p.fill(CM.ink); p.textSize(14);
      p.text('Parallelogram', cx + S/2, labelY);
      p.fill(CM.muted); p.textSize(15);
      p.text('Area = b × h', cx + S/2, labelY + 20);
    } else {
      p.fill(CM.ink); p.textSize(14);
      p.text('Rectangle — same area!', cx, labelY);
      p.fill(CM.successDk); p.textSize(15);
      p.text('Area = b × h', cx, labelY + 20);
    }

    // ── Caption ───────────────────────────────────────────────────────────
    p.textSize(12); p.fill(CM.muted);
    p.textAlign(p.CENTER, p.BOTTOM);
    const cap = settled
      ? 'The triangle has moved — the rectangle has the same area as the parallelogram'
      : 'Slide to cut the right triangle and move it to the left — forming a rectangle';
    p.text(cap, W/2, H - 8);
  };
});

document.getElementById('sl-t').addEventListener('input', function() {
  t = this.value / 100;
  sketch.redraw();
});
</script>
</body>
</html>
